# retrieval_config.yaml
# Retrieval pipeline hyperparameters matching the manuscript configuration.
# All values match those reported in the paper unless otherwise noted.

bm25:
  k1: 1.5      # BM25Okapi term-frequency saturation parameter
  b: 0.75      # BM25Okapi document-length normalization parameter

dense:
  model_name: all-MiniLM-L6-v2   # HuggingFace sentence-transformers model
  similarity: cosine              # cosine similarity via inner product after L2 normalization
  index_type: faiss_index_flat_ip # exact inner-product FAISS index

retrieval:
  top_k_per_retriever: 20    # candidates retrieved from each individual retriever
  rrf_k: 60                  # RRF smoothing constant (Cormack et al., SIGIR 2009)
  top_m_fused: 5             # top-m passages passed to generation after fusion and dedup
  deduplication: sha256      # SHA-256 content-hash deduplication

orchestration:
  confidence_threshold: 0.65  # escalate to human support if confidence below threshold
  escalation_top_passages: 3  # number of top passages used for confidence estimation
