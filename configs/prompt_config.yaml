# prompt_config.yaml
# LLM generation settings used in the paper's hallucination rate experiments.
#
# NOTE: Exact LLM-based generation requires API access and the specified model
# snapshot. Local scripts are reproducibility templates and may use placeholders
# where API access is unavailable. Results will differ if a different model
# snapshot or temperature is used.
#
# API keys must be set as environment variables — never hard-code credentials:
#   export LLM_API_KEY="your-key-here"

generation_model: gpt-4o-2024-08-06   # pinned snapshot used in the paper
temperature: 0.0                        # deterministic/greedy decoding
max_tokens: 512
api_key_env: LLM_API_KEY               # environment variable holding the API key

prompt_templates:
  authenticated_agent:
    system: |
      You are a helpful enterprise knowledge assistant.
      Answer the user's question using ONLY the information provided in the context passages below.
      If the passages do not contain enough information to answer the question,
      respond with: 'I don't have enough information in the available knowledge base to answer this question.'
      Do not fabricate information or draw on knowledge outside the provided passages.

  public_agent:
    system: |
      You are a helpful enterprise knowledge assistant.
      Answer the user's question using ONLY the information provided in the context passages below.
      If the passages do not contain enough information to answer the question,
      respond with: 'I don't have enough information in the available knowledge base to answer this question.'
      Do not fabricate information or draw on knowledge outside the provided passages.
      Note: you are serving a public (unauthenticated) user.
      Restrict your answer to information available in public knowledge articles only.

generation:
  max_passage_chars: 1000          # max characters per retrieved passage in context
  include_source_attribution: true
